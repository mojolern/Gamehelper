# Automatischer Build + Upload bei jedem Tag (z.B. v1.0.1)
stages:
  - publish

variables:
  DOTNET_VERSION: "10.0.x"
  PACKAGE_NAME: "gamehelper"

publish:
  stage: publish
  image: mcr.microsoft.com/dotnet/sdk:10.0
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl
  script:
    - dotnet restore GameOverlay.sln
    - dotnet build GameOverlay.sln -c Release
    - pwsh -File scripts/publish.ps1 -Version "${CI_COMMIT_TAG#v}" -SkipDownloader
  artifacts:
    paths:
      - publish/
    expire_in: 7 days
